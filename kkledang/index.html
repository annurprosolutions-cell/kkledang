<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Pengurusan & Analisis</title>
    
    <!-- PWA & Mobile Meta Tags -->
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Portal Pintar">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Manifest Web App untuk mode "Standalone" (Format sebaris untuk satu fail) -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Portal Pengurusan & Analisis","short_name":"Portal Pintar","start_url":".","display":"standalone","background_color":"#f8fafc","theme_color":"#2563eb","icons":[{"src":"https://i.postimg.cc/zV0yCRpJ/logo.png","sizes":"192x192 512x512","type":"image/png"}]}'>
    
    <!-- Favicon & App Icons (Using provided logo) -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zV0yCRpJ/logo.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/zV0yCRpJ/logo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS for subtle animations & tooltip -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tooltip custom styling for better mobile support */
        .tooltip .tooltip-text {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- ========================================== -->
    <!-- VIEW: LOGIN PAGE -->
    <!-- ========================================== -->
    <div id="login-view" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden fade-in">
        <div class="bg-blue-600 p-6 flex flex-col items-center">
            <!-- Logo with fallback if direct postimg link fails -->
            <img src="https://i.postimg.cc/zV0yCRpJ/logo.png" onerror="this.src='https://placehold.co/100x100/ffffff/2563eb?text=LOGO'" alt="Logo" class="w-24 h-24 object-contain mb-4 rounded-full bg-white p-1 shadow-md">
            <h1 class="text-2xl font-bold text-white tracking-wide">Log Masuk</h1>
            <p class="text-blue-100 text-sm mt-1">Sila masukkan emel dan kata laluan anda</p>
        </div>
        
        <form id="login-form" class="p-8 space-y-6">
            <div id="error-message" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-200 text-center">
                Log masuk gagal. Sila semak emel dan kata laluan anda.
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2" for="email">Emel Pengguna</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-slate-400"></i>
                    </div>
                    <input type="email" id="email" required placeholder="contoh@emel.com"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2" for="password">Kata Laluan</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors">
                </div>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-all flex justify-center items-center gap-2">
                <span id="btn-text">Log Masuk</span>
                <i id="btn-spinner" class="fas fa-circle-notch fa-spin hidden"></i>
            </button>
            
            <p id="data-status" class="text-xs text-center text-slate-400 mt-4">
                <i class="fas fa-spinner fa-spin mr-1"></i> Sedang menyambung ke pangkalan data...
            </p>
        </form>
    </div>

    <!-- ========================================== -->
    <!-- JAVASCRIPT LOGIC -->
    <!-- ========================================== -->
    <script>
        // Google Sheet CSV URL
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgxWeoxfbuJff8E-RfTPaTaWkXbp--fhJhYMpf6PRV1GdBLQTBCdRmesBTfwGE1p_pJ1SItOnjYKsX/pub?output=csv';
        
        let usersData = [];
        let isDataLoaded = false;
        let loggedInUserEmail = ""; // Menyimpan rekod sesi siapa log masuk

        // Fetch and parse CSV data on page load
        async function fetchUsers() {
            const statusEl = document.getElementById('data-status');
            const loginBtn = document.getElementById('login-btn');
            
            try {
                // Disable login button while fetching
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-70', 'cursor-not-allowed');
                
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                // Parse CSV (simple split by newline and comma)
                const rows = csvText.split('\n').map(row => row.trim()).filter(row => row);
                
                // Assuming row 0 is headers, loop from row 1
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',');
                    if (columns.length >= 2) {
                        usersData.push({
                            email: columns[0].trim().toLowerCase(),
                            password: columns[1].trim()
                        });
                    }
                }
                
                isDataLoaded = true;
                statusEl.innerHTML = '<i class="fas fa-check-circle text-green-500 mr-1"></i> Sistem sedia digunakan';
                statusEl.classList.replace('text-slate-400', 'text-green-600');
                
                // Enable button
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-70', 'cursor-not-allowed');

            } catch (error) {
                console.error("Ralat mengambil data:", error);
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-red-500 mr-1"></i> Gagal menyambung ke pangkalan data';
                statusEl.classList.replace('text-slate-400', 'text-red-500');
            }
        }

        // Handle Login Submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!isDataLoaded) {
                alert("Sila tunggu sebentar. Sedang memuat turun data...");
                return;
            }

            const inputEmail = document.getElementById('email').value.trim().toLowerCase();
            const inputPassword = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-message');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');

            // UI Loading state
            btnText.innerText = "Mengesahkan...";
            btnSpinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            // Simulate slight network delay for realistic UX
            setTimeout(() => {
                // Validate against Google Sheet Data
                const userExists = usersData.find(user => user.email === inputEmail && user.password === inputPassword);

                if (userExists) {
                    // Success Login
                    loggedInUserEmail = userExists.email;
                    document.getElementById('login-form').reset();
                    
                    // Terus arahkan pengguna ke laluan /home
                    window.location.href = "/home";
                } else {
                    // Failed Login
                    errorMsg.classList.remove('hidden');
                }
                
                // Reset Button UI
                btnText.innerText = "Log Masuk";
                btnSpinner.classList.add('hidden');
            }, 800);
        });

        // Initialize script
        window.onload = () => {
            fetchUsers();
        };
    </script>
</body>
</html>
